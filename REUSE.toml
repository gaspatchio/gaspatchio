version = 1
SPDX-PackageName = "gaspatchio"
SPDX-PackageSupplier = "Opio Inc."
SPDX-PackageDownloadLocation = "https://github.com/gaspatchio/gaspatchio"

# Blanket assertion: everything in the repo that REUSE doesn't otherwise see a
# per-file SPDX header on is Apache-2.0, copyright Opio Inc. Per-file headers
# (where they exist) take precedence — see `precedence = "aggregate"` semantics
# in the REUSE 3.3 spec.

[[annotations]]
path = [
  "LICENSE",
  "NOTICE",
  "**py.typed",
  "**.python-version",
  "**.md",
  "**.toml",
  "**.yml",
  "**.yaml",
  "**.json",
  "**.jsonl",
  "**.lock",
  "**.txt",
  "**.cfg",
  "**.ini",
  "**.csv",
  "**.parquet",
  "**.xlsx",
  "**.xlsm",
  "**.xls",
  "**.pdf",
  "**.png",
  "**.svg",
  "**.gitignore",
  "**.gitattributes",
  ".mailmap",
  "**Cargo.toml",
  "**pyproject.toml",
  "**uv.lock",
  "**Cargo.lock",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Opio Inc."
SPDX-License-Identifier = "Apache-2.0"

# The Level 4 tutorial reconciles a gaspatchio-native model against lifelib's
# "IntegratedLife" example. The reference outputs and the assumption /
# model-point data under that tutorial are derived from lifelib
# (https://github.com/lifelib-dev/lifelib), which is MIT-licensed. Only the
# lifelib-derived *data* is marked MIT here, overriding the Apache-2.0 blanket
# above; the tutorial's own code keeps its Opio Apache-2.0 SPDX headers. See the
# NOTICE file for the full attribution and licence text.
[[annotations]]
path = [
  "bindings/python/gaspatchio_core/tutorials/level-4-lifelib/reference/**.parquet",
  "bindings/python/gaspatchio_core/tutorials/level-4-lifelib/base/assumptions/**.parquet",
  "bindings/python/gaspatchio_core/tutorials/level-4-lifelib/base/model_points*.parquet",
]
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2022 lifelib Developers"
SPDX-License-Identifier = "MIT"
