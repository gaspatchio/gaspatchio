# Mypy configuration specifically for stubtest
# Less strict than the main config to allow stubtest to run
[mypy]
python_version = 3.12
ignore_missing_imports = true
# Disable most strict checks for stubtest purposes
strict = false
warn_unused_ignores = false
warn_redundant_casts = false
disallow_untyped_defs = false
disallow_untyped_calls = false
check_untyped_defs = false
disallow_incomplete_defs = false
disallow_any_generics = false
no_implicit_optional = false
warn_return_any = false

# Ignore specific modules with many type errors
[mypy-gaspatchio_core.errors.*]
ignore_errors = true

[mypy-gaspatchio_core.frame.graph.*]
ignore_errors = true

[mypy-gaspatchio_core.examples.*]
ignore_errors = true

[mypy-gaspatchio_core.assumptions._analysis]
ignore_errors = true

[mypy-gaspatchio_core.assumptions._utils]
ignore_errors = true

[mypy-gaspatchio_core.assumptions._dimensions]
ignore_errors = true

[mypy-gaspatchio_core.assumptions._builder]
ignore_errors = true

[mypy-gaspatchio_core.assumptions._api]
ignore_errors = true

[mypy-gaspatchio_core.telemetry]
ignore_errors = true

[mypy-gaspatchio_core.cli]
ignore_errors = true

[mypy-gaspatchio_core.functions.*]
ignore_errors = true

[mypy-gaspatchio_core.column.condition_expression]
ignore_errors = true

[mypy-gaspatchio_core.tutorials.*]
ignore_errors = true

[mypy-gaspatchio_core.tutorial_cli]
ignore_errors = true

[mypy-gaspatchio_core.schedule._schedule]
ignore_errors = true

[mypy-dateutil.*]
ignore_missing_imports = true
ignore_errors = true
