name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly full scan to catch newly-published CVEs against unchanged deps.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  # Required by the reusable workflow to upload SARIF for the Security tab.
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      # GitHub Advanced Security / Code Scanning is not enabled on this repo,
      # so skip SARIF upload. The scan itself still runs and fails on any
      # new vulnerability introduced by the PR.
      upload-sarif: false
      scan-args: |-
        -r
        ./

  scan-scheduled:
    if: ${{ github.event_name != 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      upload-sarif: false
      scan-args: |-
        -r
        ./
