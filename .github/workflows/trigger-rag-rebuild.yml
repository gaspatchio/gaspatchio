# ABOUTME: Triggers RAG store rebuild when Python bindings change
# ABOUTME: Dispatches to gaspatchio-mix to rebuild and sync documentation

name: Trigger RAG Rebuild

on:
  push:
    branches:
      - main
    paths:
      - 'bindings/python/**'

jobs:
  trigger:
    name: Trigger RAG Store Rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch rebuild event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: opioinc/gaspatchio-mix
          event-type: rebuild-rag
          client-payload: '{"source": "gaspatchio-core", "ref": "${{ github.sha }}"}'
