# This file is autogenerated by maturin v1.8.2
# To update, run
#
#    maturin generate-ci github
#
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded in-progress run on the same ref (e.g. rapid pushes to a
# branch or PR). Per-ref, so a tag/release build is its own group and is never
# cancelled by branch pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo tests
        run: cargo test
        working-directory: core

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install uv and cache dependencies
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          working-directory: bindings/python
      - name: Cache maturin build artifacts
        uses: actions/cache@v6
        with:
          path: bindings/python/target
          key: ${{ runner.os }}-maturin-dev-${{ hashFiles('**/Cargo.lock', 'bindings/python/**/*.rs', 'core/src/**/*.rs') }}
          # No restore-keys — stale caches with missing Rust functions cause test failures
      - name: Install Python dependencies and build extension
        run: uv sync
        working-directory: bindings/python
      - name: Run Python tests
        run: uv run pytest -v
        working-directory: bindings/python
      - name: Verify stub files match runtime
        run: uv run python -m mypy.stubtest gaspatchio_core --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy-stubtest.ini --allowlist stubtest-allowlist.txt
        working-directory: bindings/python

  manylinux:
    name: Manylinux Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v7
      - name: Build with Docker
        run: docker run --rm -v $(pwd):/io -w /io/bindings/python ghcr.io/pyo3/maturin build --release --find-interpreter
      - name: List build artifacts
        run: find . -name "*.whl" -o -name "*.tar.gz"
      - name: Create dist directory
        run: mkdir -p dist
      - name: Copy built wheels
        run: |
          cp $(find . -name "*.whl") dist/ || echo "No wheels found"
          cp $(find . -name "*.tar.gz") dist/ || echo "No source distributions found"
      - name: Upload manylinux build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-manylinux
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    # Tag pushes build the release wheels. Pushes to main build them too — not
    # for the artifacts, but because GitHub cache scoping only lets a
    # tag-triggered run restore caches created on the default branch: main runs
    # are what keep the Rust build caches warm. One leg per interpreter: the
    # polars stack sits inside pyo3's dependency cone, so changing interpreter
    # recompiles all of it (~14 min on windows), and sequential
    # `--find-interpreter` builds thrash one target dir — a shared cache could
    # only ever hold the last interpreter's artifacts, so the expensive layer
    # never hit (measured: 44 min warm vs 51 cold). Per-interpreter legs run in
    # parallel and each keeps a cache that actually hits. The matrix must cover
    # every CPython allowed by requires-python in bindings/python/pyproject.toml.
    # These jobs also surface Windows build breakage between releases.
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        id: python
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.platform.target }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4   # v2.9.1
        with:
          key: ${{ matrix.platform.target }}-py${{ matrix.python }}
          # A cache saved on a tag ref is unreachable from every other ref, so
          # tag runs restore-only; main runs are the sole writers.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # Pin the interpreter to the exact one setup-python installed —
          # `--find-interpreter` would build for every python on the runner
          # image, collapsing the legs back into one thrashing build.
          args: --release --out dist -i ${{ steps.python.outputs.python-path }}
          working-directory: bindings/python
      - name: Upload wheels
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: bindings/python/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    # Runs on main pushes for the same cache-warming reason as the windows job,
    # and one leg per (target, interpreter) for the same reason — see the
    # comment there. Keep the python matrix in sync with requires-python.
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64
          - runner: macos-latest
            target: aarch64
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        id: python
        with:
          python-version: ${{ matrix.python }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4   # v2.9.1
        with:
          # All legs run on the same runner image; without target + python in
          # the key they would race to save one shared (wrong) cache.
          key: ${{ matrix.platform.target }}-py${{ matrix.python }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ steps.python.outputs.python-path }}
          working-directory: bindings/python
      - name: Upload wheels
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: bindings/python/dist

  skill-structure-tests:
    name: Skill Structure Tests (Tier 1)
    needs: [python-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Run skill structure tests
        run: uv run pytest ../../tests/skills/ -v
      - name: Skill manifests in sync (generated, no drift)
        run: uv run python ../../scripts/gen_skill_manifests.py --check

  tutorial-smoke-tests:
    name: Tutorial Smoke Tests
    needs: [python-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Run tutorial base models
        run: |
          for model_file in ../../tutorial/level-*/base/model.py; do
            echo "Running $model_file..."
            uv run python "$model_file" || exit 1
          done
          # L4 has no __main__ block, test via its runner
          echo "Running L4 benchmark runner..."
          uv run python ../../tutorial/level-4-lifelib/base/run_benchmark.py || exit 1

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests, manylinux, windows, macos, sdist]
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) + PEP 740 attestation signing
      contents: write   # create/publish the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v4 — so syft can read Cargo.lock / pyproject at the tag
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78   # v6 — provides `uvx` for `twine check`
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List distributions
        run: ls -l dist

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610   # v0
        with:
          path: .                       # captures Cargo.lock, pyproject, and the wheels now in dist/
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-release-assets: false  # we attach it manually in the release step

      - name: Check distribution metadata
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI (Trusted Publishing)
        if: github.repository == 'gaspatchio/gaspatchio'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247   # v1.14.1
        with:
          packages-dir: dist
          # OIDC Trusted Publishing — no token. PEP 740 attestations are generated automatically.
      # The org enforces immutable releases: a published release's assets are
      # locked at publish time, so they cannot be uploaded after the fact. Create
      # the release as a DRAFT (mutable), attach every wheel, then publish — the
      # assets lock in atomically. Creating a published release first and uploading
      # afterwards 422s ("Cannot upload assets to an immutable release") and burns
      # the tag. Artifacts were merged into `dist/`; attach those plus the SBOM.
      - name: Create draft release with wheels + SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft --verify-tag --generate-notes \
            dist/* sbom.cdx.json
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
