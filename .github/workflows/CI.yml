name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo tests
        run: cargo test
        working-directory: core

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install uv and cache dependencies
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          working-directory: bindings/python
      - name: Cache maturin build artifacts
        uses: actions/cache@v4
        with:
          path: bindings/python/target
          key: ${{ runner.os }}-maturin-dev-${{ hashFiles('**/Cargo.lock', 'bindings/python/**/*.rs', 'core/src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-maturin-dev-
      - name: Install Python dependencies
        run: uv sync
        working-directory: bindings/python
      - name: Run Python tests
        run: uv run pytest -v
        working-directory: bindings/python
      - name: Verify stub files match runtime
        run: uv run python -m mypy.stubtest gaspatchio_core --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy-stubtest.ini --allowlist stubtest-allowlist.txt
        working-directory: bindings/python

  manylinux:
    name: Manylinux Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build with Docker
        run: docker run --rm -v $(pwd):/io -w /io/bindings/python ghcr.io/pyo3/maturin build --release
      - name: List build artifacts
        run: find . -name "*.whl" -o -name "*.tar.gz"
      - name: Create dist directory
        run: mkdir -p dist
      - name: Copy built wheels
        run: |
          cp $(find . -name "*.whl") dist/ || echo "No wheels found"
          cp $(find . -name "*.tar.gz") dist/ || echo "No source distributions found"
      - name: Upload manylinux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: bindings/python/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests, manylinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: wheels-*/*
          generate_release_notes: true
