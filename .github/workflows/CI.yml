# This file is autogenerated by maturin v1.8.2
# To update, run
#
#    maturin generate-ci github
#
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded in-progress run on the same ref (e.g. rapid pushes to a
# branch or PR). Per-ref, so a tag/release build is its own group and is never
# cancelled by branch pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo tests
        run: cargo test
        working-directory: core

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv and cache dependencies
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          working-directory: bindings/python
      - name: Cache maturin build artifacts
        uses: actions/cache@v4
        with:
          path: bindings/python/target
          key: ${{ runner.os }}-maturin-dev-${{ hashFiles('**/Cargo.lock', 'bindings/python/**/*.rs', 'core/src/**/*.rs') }}
          # No restore-keys — stale caches with missing Rust functions cause test failures
      - name: Install Python dependencies and build extension
        run: uv sync
        working-directory: bindings/python
      - name: Run Python tests
        run: uv run pytest -v
        working-directory: bindings/python
      - name: Verify stub files match runtime
        run: uv run python -m mypy.stubtest gaspatchio_core --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy-stubtest.ini --allowlist stubtest-allowlist.txt
        working-directory: bindings/python

  manylinux:
    name: Manylinux Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build with Docker
        run: docker run --rm -v $(pwd):/io -w /io/bindings/python ghcr.io/pyo3/maturin build --release --find-interpreter
      - name: List build artifacts
        run: find . -name "*.whl" -o -name "*.tar.gz"
      - name: Create dist directory
        run: mkdir -p dist
      - name: Copy built wheels
        run: |
          cp $(find . -name "*.whl") dist/ || echo "No wheels found"
          cp $(find . -name "*.tar.gz") dist/ || echo "No source distributions found"
      - name: Upload manylinux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: bindings/python/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: bindings/python/dist

  sdist:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  skill-structure-tests:
    name: Skill Structure Tests (Tier 1)
    needs: [python-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Run skill structure tests
        run: uv run pytest ../../tests/skills/ -v

  tutorial-smoke-tests:
    name: Tutorial Smoke Tests
    needs: [python-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Run tutorial base models
        run: |
          for model_file in ../../tutorial/level-*/base/model.py; do
            echo "Running $model_file..."
            uv run python "$model_file" || exit 1
          done
          # L4 has no __main__ block, test via its runner
          echo "Running L4 benchmark runner..."
          uv run python ../../tutorial/level-4-lifelib/base/run_benchmark.py || exit 1

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-tests, python-tests, manylinux, windows, macos, sdist]
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) + PEP 740 attestation signing
      contents: write   # create/publish the GitHub Release
    steps:
      - uses: actions/checkout@v4            # needed so syft can read Cargo.lock / pyproject at the tag
      - uses: astral-sh/setup-uv@v6          # provides `uvx` for `twine check`
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List distributions
        run: ls -l dist

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .                       # captures Cargo.lock, pyproject, and the wheels now in dist/
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-release-assets: false  # we attach it manually in the release step
      # The org enforces immutable releases: a published release's assets are
      # locked at publish time, so they cannot be uploaded after the fact. Create
      # the release as a DRAFT (mutable), attach every wheel, then publish — the
      # assets lock in atomically. Creating a published release first and uploading
      # afterwards 422s ("Cannot upload assets to an immutable release") and burns
      # the tag. `wheels-*/*` matches the per-artifact dirs from download-artifact.
      - name: Create draft release with wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft --verify-tag --generate-notes \
            wheels-*/*
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
