# Dependabot — passive security and version-update PR raising.
# Pairs with .github/workflows/security.yml (active OSV scanning on every PR).

version: 2
updates:
  # Rust core dependencies
  - package-ecosystem: cargo
    directory: /core
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # One grouped PR per week instead of one-per-dependency — collapses the
    # CI fan-out (each PR otherwise fires CI/CD + Security + Licence).
    groups:
      cargo:
        patterns:
          - "*"
    labels:
      - dependencies
      - rust

  # Python bindings + dev deps
  - package-ecosystem: pip
    directory: /bindings/python
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns:
          - "*"
    labels:
      - dependencies
      - python

  # GitHub Actions versions (pin action SHAs / track major upgrades)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
